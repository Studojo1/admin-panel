name: Admin Panel CI/CD

on:
  push:
    branches:
      - main
      - master
  tags:
    - 'v*.*.*'

jobs:
  build-and-deploy:
    uses: studojo/studojo/.github/workflows/service-ci-cd.yml@master
    with:
      service_name: admin-panel
      service_path: .
      k8s_deployment_name: admin-panel
      k8s_container_name: admin-panel
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
      DEV_PANEL_WEBHOOK_URL: ${{ secrets.DEV_PANEL_WEBHOOK_URL }}
